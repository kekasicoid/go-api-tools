basePath: /
definitions:
  model.FormatJsonRequest:
    properties:
      data:
        example: '{"name":"kekasi","age":25}'
        type: string
    type: object
  model.FormatJsonResponse:
    properties:
      formatted:
        example: |-
          {
            "name": "kekasi",
            "age": 25
          }
        type: string
    type: object
  model.FormatJsonResponseSwag:
    properties:
      response_code:
        example: "200"
        type: string
      response_data:
        $ref: '#/definitions/model.FormatJsonResponse'
      response_desc:
        example: success
        type: string
      response_id:
        example: abc-123
        type: string
      response_refnum:
        example: ""
        type: string
    type: object
  model.JWTDecodeValidationRequest:
    properties:
      secret:
        example: my-secret-key
        type: string
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIn0.dozjgNryP4J3jVmNHl0w5N_XgL0n3I9PlFUP0THsR8U
        type: string
    type: object
  model.JWTDecodeValidationResponse:
    properties:
      claims:
        additionalProperties: true
        type: object
      header:
        additionalProperties: true
        type: object
      valid:
        type: boolean
    type: object
  model.JWTDecodeValidationResponseSwag:
    properties:
      response_code:
        example: "200"
        type: string
      response_data:
        $ref: '#/definitions/model.JWTDecodeValidationResponse'
      response_desc:
        example: success
        type: string
      response_id:
        example: abc-123
        type: string
      response_refnum:
        example: ""
        type: string
    type: object
  model.SwaggRespError:
    properties:
      response_code:
        example: "400"
        type: string
      response_data: {}
      response_desc:
        example: data is required
        type: string
      response_id:
        example: abc-123
        type: string
      response_refnum:
        example: ""
        type: string
    type: object
host: localhost:7070
info:
  contact:
    email: arditya@kekasi.co.id
    name: Official support
    url: https://kekasi.co.id/en/contact/
  description: A collection of API tools in Go.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  title: Go API Tools by Arditya Kekasi
  version: "1.0"
paths:
  /tools/json/format:
    post:
      consumes:
      - application/json
      description: Format a raw JSON string into pretty JSON
      parameters:
      - description: Request ID (alphanumeric, max 50 chars)
        in: header
        name: request-id
        required: true
        type: string
      - description: JSON data to format
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.FormatJsonRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.FormatJsonResponseSwag'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.SwaggRespError'
      summary: Format JSON data
      tags:
      - tools
  /tools/jwt/decode-validation:
    post:
      consumes:
      - application/json
      description: Parse a JWT token and return its header and claims. When a secret
        is provided the signature is also verified and the valid field reflects the
        result.
      parameters:
      - description: Request ID (alphanumeric, max 50 chars)
        in: header
        name: request-id
        required: true
        type: string
      - description: JWT token and optional HMAC secret
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.JWTDecodeValidationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.JWTDecodeValidationResponseSwag'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/model.SwaggRespError'
      summary: Decode and validate JWT token
      tags:
      - tools
swagger: "2.0"
