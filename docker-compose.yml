services:
  app:
    build:
      context: .
    image: go-api-tools-app
    container_name: go-api-tools-app
    ports:
      - "127.0.0.1:7070:8080"
    environment:
      - HTTP_PORT=8080
      - CORS_ORIGIN=${CORS_ORIGIN}
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB}
      - APP_ENV=${APP_ENV}
    depends_on:
      - redis

  redis:
    image: redis:8.6.2
    container_name: go-api-tools-redis
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD}" ]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
