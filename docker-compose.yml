services:
  app:
    build:
      context: .
    image: go-api-tools-app
    container_name: go-api-tools-app
    ports:
      - "7070:8080"
    environment:
      - HTTP_PORT=8080
      - CORS_ORIGIN=${CORS_ORIGIN}
      - REDIS_ADDR=redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB}
    depends_on:
      - redis

  redis:
    image: redis:latest
    container_name: go-api-tools-redis
    command: [ "redis-server", "--requirepass", "${REDIS_PASSWORD}" ]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
